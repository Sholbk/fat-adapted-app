<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="40%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#043bb1"/>
    </linearGradient>
    <linearGradient id="logo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e8ad3"/>
      <stop offset="100%" stop-color="#fe00a4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="200" y1="0" x2="1200" y2="500"/>
    <line x1="400" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="200" x2="1000" y2="630"/>
    <line x1="0" y1="400" x2="800" y2="630"/>
  </g>

  <!-- Logo circle -->
  <rect x="100" y="200" width="80" height="80" rx="20" fill="url(#logo)"/>
  <path d="M148 218l-16 29h11l-5 26 21-32h-12z" fill="#fff"/>

  <!-- App name -->
  <text x="200" y="260" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="64" font-weight="800" fill="#ffffff">FastFuel</text>

  <!-- Tagline -->
  <text x="102" y="330" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="28" fill="rgba(255,255,255,0.7)">Smart Nutrition for Endurance Athletes</text>

  <!-- Feature bullets -->
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="22" fill="rgba(255,255,255,0.55)">
    <circle cx="118" cy="404" r="4" fill="#4da6e8"/>
    <text x="134" y="412">Training-synced daily macros</text>

    <circle cx="118" cy="444" r="4" fill="#4da6e8"/>
    <text x="134" y="452">Intervals.icu + Strava + Athletica.ai</text>

    <circle cx="118" cy="484" r="4" fill="#4da6e8"/>
    <text x="134" y="492">Meal logging, recipes, and fuel testing</text>
  </g>

  <!-- URL -->
  <text x="102" y="570" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="20" font-weight="600" fill="#4da6e8">fastfuel.training</text>

  <!-- Decorative ring (right side) -->
  <g transform="translate(900, 315)" opacity="0.12">
    <circle cx="0" cy="0" r="180" fill="none" stroke="#4da6e8" stroke-width="30" stroke-dasharray="280 850"/>
    <circle cx="0" cy="0" r="130" fill="none" stroke="#fe00a4" stroke-width="20" stroke-dasharray="200 620"/>
    <circle cx="0" cy="0" r="85" fill="none" stroke="#10bc10" stroke-width="14" stroke-dasharray="140 400"/>
  </g>
</svg>
