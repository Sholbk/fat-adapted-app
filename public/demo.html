<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FastFuel Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0f0f1a;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  width: 1920px;
  height: 1080px;
}

.scene {
  position: relative;
  width: 1920px;
  height: 1080px;
  background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 40%, #043bb1 100%);
  overflow: hidden;
}

/* Ground / track */
.track {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 280px;
  background: linear-gradient(180deg, #2a1a1a 0%, #1a1210 100%);
}
.track::before {
  content: "";
  position: absolute;
  top: 0;
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,0.15);
}

/* Lane lines */
.lane { position: absolute; width: 100%; height: 1px; background: rgba(255,255,255,0.06); }
.lane:nth-child(1) { top: 70px; }
.lane:nth-child(2) { top: 140px; }
.lane:nth-child(3) { top: 210px; }

/* Finish line */
.finish-line {
  position: absolute;
  right: 320px;
  top: 0;
  width: 12px;
  height: 280px;
  background: repeating-linear-gradient(
    0deg,
    #fff 0px, #fff 15px,
    #000 15px, #000 30px
  );
  opacity: 0.7;
  z-index: 5;
}
.finish-banner {
  position: absolute;
  right: 260px;
  bottom: 310px;
  font-size: 18px;
  font-weight: 800;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  z-index: 5;
}

/* Runner silhouettes */
.runner {
  position: absolute;
  bottom: 130px;
  z-index: 10;
  transition: none;
}
.runner svg {
  width: 90px;
  height: 130px;
}

/* Runner positions and animations */
.runner-1 {
  animation: runner1 20s linear forwards;
}
.runner-2 {
  bottom: 155px;
  animation: runner2 20s linear forwards;
}
.runner-3 {
  bottom: 105px;
  animation: runner3 20s linear forwards;
}
/* The hero runner - starts behind */
.runner-hero {
  bottom: 180px;
  z-index: 15;
  animation: runnerHero 20s linear forwards;
}
.runner-hero svg { filter: drop-shadow(0 0 20px rgba(30,138,211,0.6)); }

/* Runner bobbing animation */
.runner-bob {
  animation: bob 0.35s ease-in-out infinite alternate;
}
.runner-bob-slow {
  animation: bob 0.45s ease-in-out infinite alternate;
}
@keyframes bob {
  from { transform: translateY(0); }
  to { transform: translateY(-6px); }
}

/* Pack runners move steadily */
@keyframes runner1 {
  0% { left: -150px; }
  30% { left: 900px; }
  50% { left: 1200px; }
  70% { left: 1400px; }
  85% { left: 1500px; }
  100% { left: 1560px; }
}
@keyframes runner2 {
  0% { left: -220px; }
  30% { left: 830px; }
  50% { left: 1130px; }
  70% { left: 1330px; }
  85% { left: 1440px; }
  100% { left: 1500px; }
}
@keyframes runner3 {
  0% { left: -100px; }
  30% { left: 950px; }
  50% { left: 1250px; }
  70% { left: 1420px; }
  85% { left: 1510px; }
  100% { left: 1570px; }
}

/* Hero: starts slow, then surges past at 55-75% */
@keyframes runnerHero {
  0% { left: -300px; }
  30% { left: 700px; }
  45% { left: 950px; }
  55% { left: 1100px; }
  65% { left: 1400px; }
  72% { left: 1600px; }
  80% { left: 1680px; }
  100% { left: 1700px; }
}

/* Glow trail behind hero during surge */
.hero-trail {
  position: absolute;
  bottom: 200px;
  width: 200px;
  height: 20px;
  background: linear-gradient(90deg, transparent, rgba(30,138,211,0.4), transparent);
  border-radius: 50%;
  z-index: 14;
  opacity: 0;
  animation: heroTrail 20s linear forwards;
}
@keyframes heroTrail {
  0%, 50% { opacity: 0; left: 900px; }
  55% { opacity: 0.8; left: 1000px; }
  65% { opacity: 1; left: 1300px; }
  72% { opacity: 0.6; left: 1500px; }
  80%, 100% { opacity: 0; left: 1600px; }
}

/* Energy burst when hero surges */
.energy-burst {
  position: absolute;
  bottom: 230px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(30,138,211,0.6), transparent 70%);
  z-index: 13;
  opacity: 0;
  animation: burst 20s linear forwards;
}
@keyframes burst {
  0%, 52% { opacity: 0; left: 1050px; transform: scale(0.5); }
  55% { opacity: 1; left: 1100px; transform: scale(2); }
  60% { opacity: 0; left: 1200px; transform: scale(3); }
  100% { opacity: 0; }
}

/* Text overlays */
.text-overlay {
  position: absolute;
  z-index: 50;
  width: 100%;
  text-align: center;
  opacity: 0;
}

.text-1 {
  top: 180px;
  animation: text1 20s linear forwards;
}
.text-1 h2 {
  font-size: 72px;
  font-weight: 800;
  color: #fff;
  text-shadow: 0 4px 30px rgba(0,0,0,0.5);
}
.text-1 p {
  font-size: 32px;
  color: rgba(255,255,255,0.6);
  margin-top: 12px;
}
@keyframes text1 {
  0% { opacity: 0; transform: translateY(20px); }
  5% { opacity: 1; transform: translateY(0); }
  25% { opacity: 1; }
  30% { opacity: 0; }
  100% { opacity: 0; }
}

.text-2 {
  top: 200px;
  animation: text2 20s linear forwards;
}
.text-2 h2 {
  font-size: 64px;
  font-weight: 800;
  color: #fe00a4;
  text-shadow: 0 4px 30px rgba(0,0,0,0.5);
}
@keyframes text2 {
  0%, 30% { opacity: 0; }
  35% { opacity: 1; transform: translateY(0); }
  48% { opacity: 1; }
  52% { opacity: 0; }
  100% { opacity: 0; }
}

.text-3 {
  top: 160px;
  animation: text3 20s linear forwards;
}
.text-3 h2 {
  font-size: 90px;
  font-weight: 800;
  color: #fff;
  text-shadow: 0 0 40px rgba(30,138,211,0.8);
}
.text-3 p {
  font-size: 28px;
  color: rgba(255,255,255,0.5);
  margin-top: 8px;
}
@keyframes text3 {
  0%, 52% { opacity: 0; transform: scale(0.9); }
  56% { opacity: 1; transform: scale(1); }
  70% { opacity: 1; }
  75% { opacity: 0; }
  100% { opacity: 0; }
}

/* Final logo screen */
.final {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 60;
  opacity: 0;
  animation: finalIn 20s linear forwards;
  background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 40%, #043bb1 100%);
}
@keyframes finalIn {
  0%, 76% { opacity: 0; }
  82% { opacity: 1; }
  100% { opacity: 1; }
}
.final-logo {
  width: 100px;
  height: 100px;
  background: linear-gradient(135deg, #1e8ad3, #fe00a4);
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 24px;
  animation: logoPulse 2s ease-in-out infinite alternate;
  animation-delay: 16s;
}
@keyframes logoPulse {
  from { transform: scale(1); box-shadow: 0 0 30px rgba(30,138,211,0.3); }
  to { transform: scale(1.05); box-shadow: 0 0 50px rgba(30,138,211,0.6); }
}
.final h1 {
  font-size: 96px;
  font-weight: 800;
  color: #fff;
  margin-bottom: 12px;
}
.final p {
  font-size: 32px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 40px;
}
.final .url {
  font-size: 36px;
  font-weight: 700;
  color: #4da6e8;
  letter-spacing: 0.05em;
}

/* Particle effects */
.particles {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 3;
  overflow: hidden;
}
.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 50%;
}
.particle:nth-child(1) { left: 10%; top: 20%; animation: float 6s ease-in-out infinite; }
.particle:nth-child(2) { left: 30%; top: 40%; animation: float 8s ease-in-out infinite 1s; }
.particle:nth-child(3) { left: 50%; top: 15%; animation: float 7s ease-in-out infinite 2s; }
.particle:nth-child(4) { left: 70%; top: 35%; animation: float 5s ease-in-out infinite 0.5s; }
.particle:nth-child(5) { left: 85%; top: 25%; animation: float 9s ease-in-out infinite 3s; }
.particle:nth-child(6) { left: 20%; top: 55%; animation: float 6s ease-in-out infinite 1.5s; }
.particle:nth-child(7) { left: 60%; top: 50%; animation: float 7s ease-in-out infinite 2.5s; }
.particle:nth-child(8) { left: 45%; top: 30%; animation: float 8s ease-in-out infinite 0.8s; }
@keyframes float {
  0%, 100% { transform: translateY(0) translateX(0); opacity: 0.15; }
  50% { transform: translateY(-30px) translateX(10px); opacity: 0.4; }
}

/* Speed lines during surge */
.speed-lines {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 12;
  opacity: 0;
  animation: speedIn 20s linear forwards;
}
@keyframes speedIn {
  0%, 53% { opacity: 0; }
  56% { opacity: 0.5; }
  65% { opacity: 0.3; }
  72% { opacity: 0; }
  100% { opacity: 0; }
}
.speed-line {
  position: absolute;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(30,138,211,0.5), transparent);
  animation: speedMove 0.6s linear infinite;
}
.speed-line:nth-child(1) { top: 30%; width: 300px; left: 20%; animation-delay: 0s; }
.speed-line:nth-child(2) { top: 45%; width: 250px; left: 10%; animation-delay: 0.15s; }
.speed-line:nth-child(3) { top: 55%; width: 350px; left: 30%; animation-delay: 0.3s; }
.speed-line:nth-child(4) { top: 70%; width: 200px; left: 5%; animation-delay: 0.1s; }
.speed-line:nth-child(5) { top: 38%; width: 280px; left: 40%; animation-delay: 0.25s; }
.speed-line:nth-child(6) { top: 62%; width: 320px; left: 15%; animation-delay: 0.4s; }
@keyframes speedMove {
  from { transform: translateX(-100%); }
  to { transform: translateX(300%); }
}
</style>
</head>
<body>
<div class="scene">
  <!-- Particles -->
  <div class="particles">
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div>
  </div>

  <!-- Speed lines for surge moment -->
  <div class="speed-lines">
    <div class="speed-line"></div><div class="speed-line"></div><div class="speed-line"></div>
    <div class="speed-line"></div><div class="speed-line"></div><div class="speed-line"></div>
  </div>

  <!-- Text: Scene 1 -->
  <div class="text-overlay text-1">
    <h2>Race Day.</h2>
    <p>You trained hard.</p>
  </div>

  <!-- Text: Scene 2 -->
  <div class="text-overlay text-2">
    <h2>But your nutrition didn't keep up.</h2>
  </div>

  <!-- Text: Scene 3 (surge moment) -->
  <div class="text-overlay text-3">
    <h2>Until now.</h2>
    <p>Nutrition that matches your training</p>
  </div>

  <!-- Track -->
  <div class="track">
    <div class="lane"></div>
    <div class="lane"></div>
    <div class="lane"></div>
    <div class="finish-line"></div>
    <div class="finish-banner">FINISH</div>

    <!-- Pack runners (gray) -->
    <div class="runner runner-1">
      <div class="runner-bob">
        <svg viewBox="0 0 60 100" fill="none">
          <circle cx="30" cy="12" r="10" fill="rgba(255,255,255,0.35)"/>
          <line x1="30" y1="22" x2="30" y2="55" stroke="rgba(255,255,255,0.35)" stroke-width="4" stroke-linecap="round"/>
          <line x1="30" y1="55" x2="18" y2="85" stroke="rgba(255,255,255,0.35)" stroke-width="3.5" stroke-linecap="round"/>
          <line x1="30" y1="55" x2="45" y2="80" stroke="rgba(255,255,255,0.35)" stroke-width="3.5" stroke-linecap="round"/>
          <line x1="30" y1="35" x2="12" y2="50" stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-linecap="round"/>
          <line x1="30" y1="35" x2="48" y2="45" stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <div class="runner runner-2">
      <div class="runner-bob-slow">
        <svg viewBox="0 0 60 100" fill="none">
          <circle cx="30" cy="12" r="10" fill="rgba(255,255,255,0.3)"/>
          <line x1="30" y1="22" x2="30" y2="55" stroke="rgba(255,255,255,0.3)" stroke-width="4" stroke-linecap="round"/>
          <line x1="30" y1="55" x2="16" y2="82" stroke="rgba(255,255,255,0.3)" stroke-width="3.5" stroke-linecap="round"/>
          <line x1="30" y1="55" x2="44" y2="84" stroke="rgba(255,255,255,0.3)" stroke-width="3.5" stroke-linecap="round"/>
          <line x1="30" y1="35" x2="14" y2="48" stroke="rgba(255,255,255,0.3)" stroke-width="3" stroke-linecap="round"/>
          <line x1="30" y1="35" x2="46" y2="42" stroke="rgba(255,255,255,0.3)" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <div class="runner runner-3">
      <div class="runner-bob">
        <svg viewBox="0 0 60 100" fill="none">
          <circle cx="30" cy="12" r="10" fill="rgba(255,255,255,0.25)"/>
          <line x1="30" y1="22" x2="30" y2="55" stroke="rgba(255,255,255,0.25)" stroke-width="4" stroke-linecap="round"/>
          <line x1="30" y1="55" x2="20" y2="83" stroke="rgba(255,255,255,0.25)" stroke-width="3.5" stroke-linecap="round"/>
          <line x1="30" y1="55" x2="42" y2="86" stroke="rgba(255,255,255,0.25)" stroke-width="3.5" stroke-linecap="round"/>
          <line x1="30" y1="35" x2="15" y2="52" stroke="rgba(255,255,255,0.25)" stroke-width="3" stroke-linecap="round"/>
          <line x1="30" y1="35" x2="47" y2="44" stroke="rgba(255,255,255,0.25)" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <!-- Hero runner (blue glow) -->
    <div class="runner runner-hero">
      <div class="runner-bob">
        <svg viewBox="0 0 60 100" fill="none">
          <circle cx="30" cy="12" r="10" fill="#1e8ad3"/>
          <line x1="30" y1="22" x2="30" y2="55" stroke="#1e8ad3" stroke-width="4" stroke-linecap="round"/>
          <line x1="30" y1="55" x2="16" y2="83" stroke="#1e8ad3" stroke-width="3.5" stroke-linecap="round"/>
          <line x1="30" y1="55" x2="46" y2="80" stroke="#1e8ad3" stroke-width="3.5" stroke-linecap="round"/>
          <line x1="30" y1="35" x2="10" y2="48" stroke="#1e8ad3" stroke-width="3" stroke-linecap="round"/>
          <line x1="30" y1="35" x2="50" y2="42" stroke="#1e8ad3" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <!-- Energy effects -->
    <div class="hero-trail"></div>
    <div class="energy-burst"></div>
  </div>

  <!-- Final logo screen -->
  <div class="final">
    <div class="final-logo">
      <svg viewBox="0 0 192 192" width="60" height="60"><path d="M108 28L68 100h28L80 164l52-80h-30z" fill="#fff"/></svg>
    </div>
    <h1>FastFuel</h1>
    <p>Smart Nutrition for Endurance Athletes</p>
    <span class="url">fastfuel.training</span>
  </div>
</div>
</body>
</html>
